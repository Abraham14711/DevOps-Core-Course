---

- name: Docker installation block
  block:

    - name: Install dependencies for Docker repo
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: "{{ docker_gpg_url }}"
        state: present

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: "{{ docker_apt_repo }}"
        state: present
        filename: docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes
      notify: restart docker

  rescue:

    - name: Wait before retrying Docker repo setup
      ansible.builtin.pause:
        seconds: 10

    - name: Retry apt update
      ansible.builtin.apt:
        update_cache: yes

  always:

    - name: Ensure Docker service enabled
      ansible.builtin.service:
        name: docker
        enabled: yes

  become: true
  tags:
    - docker
    - docker_install


- name: Docker configuration block
  block:

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

    - name: Install python3-docker
      ansible.builtin.apt:
        name: python3-docker
        state: present

  always:

    - name: Ensure Docker service enabled
      ansible.builtin.service:
        name: docker
        enabled: yes
        state: started

  become: true
  tags:
    - docker
    - docker_config
