apiVersion: batch/v1
kind: Job
metadata:
  name: postinstall-job
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      containers:
        - name: postinstall
          image: busybox
          command: ["sh", "-c", "echo Post-install hook running"]
      restartPolicy: Never